<app-navbar></app-navbar>
<app-sidebar></app-sidebar>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
      <i class="bi bi-tags me-2 text-primary"></i>Categorías
    </h4>
    <button class="btn btn-farmavida" (click)="abrirModal()">
      <i class="bi bi-plus-lg me-1"></i>Nueva Categoría
    </button>
  </div>

  <div *ngIf="mensaje" class="alert alert-success alert-dismissible">
    <i class="bi bi-check-circle me-2"></i>{{ mensaje }}
    <button type="button" class="btn-close" (click)="mensaje=''"></button>
  </div>

  <div class="card card-farmavida">
    <div class="card-header">
      <i class="bi bi-list-ul me-2"></i>Lista de Categorías ({{ categorias.length }})
    </div>
    <div class="card-body p-0">
      <div *ngIf="cargando" class="text-center p-4">
        <div class="spinner-border text-primary"></div>
      </div>
      <table *ngIf="!cargando" class="table table-farmavida mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of categorias">
            <td>{{ c.id }}</td>
            <td class="fw-semibold">{{ c.nombre }}</td>
            <td>{{ c.descripcion || '—' }}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-1" (click)="abrirModal(c)">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" (click)="eliminar(c.id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div *ngIf="mostrarModal" class="modal d-block" style="background:rgba(0,0,0,0.5)">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background: linear-gradient(135deg, #1565C0, #00ACC1); color:white;">
        <h5 class="modal-title">
          <i class="bi bi-tags me-2"></i>{{ editando ? 'Editar' : 'Nueva' }} Categoría
        </h5>
        <button class="btn-close btn-close-white" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
        <div class="mb-3">
          <label class="form-label">Nombre *</label>
          <input type="text" class="form-control" [(ngModel)]="form.nombre">
        </div>
        <div class="mb-3">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" rows="3" [(ngModel)]="form.descripcion"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
        <button class="btn btn-farmavida" (click)="guardar()">
          <i class="bi bi-save me-1"></i>Guardar
        </button>
      </div>
    </div>
  </div>
</div>
