<app-navbar></app-navbar>
<app-sidebar></app-sidebar>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
      <i class="bi bi-people me-2 text-primary"></i>Gestión de Usuarios
    </h4>
    <button class="btn btn-farmavida" (click)="abrirModal()">
      <i class="bi bi-person-plus me-1"></i>Nuevo Usuario
    </button>
  </div>

  <div *ngIf="mensaje" class="alert alert-success alert-dismissible">
    <i class="bi bi-check-circle me-2"></i>{{ mensaje }}
    <button type="button" class="btn-close" (click)="mensaje=''"></button>
  </div>
  <div *ngIf="error" class="alert alert-danger alert-dismissible">
    <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    <button type="button" class="btn-close" (click)="error=''"></button>
  </div>

  <!-- Buscador -->
  <div class="card card-farmavida mb-4">
    <div class="card-body">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Buscar por nombre o email..."
               [(ngModel)]="busqueda">
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card card-farmavida">
    <div class="card-header">
      <i class="bi bi-list-ul me-2"></i>Lista de Usuarios ({{ usuariosFiltrados.length }})
    </div>
    <div class="card-body p-0">
      <div *ngIf="cargando" class="text-center p-4">
        <div class="spinner-border text-primary"></div>
      </div>
      <table *ngIf="!cargando" class="table table-farmavida mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of usuariosFiltrados">
            <td>{{ u.id }}</td>
            <td class="fw-semibold">{{ u.nombre }}</td>
            <td>{{ u.email }}</td>
            <td>
              <span class="badge"
                    [ngClass]="u.rol_id === 1 ? 'bg-primary' : 'bg-info text-dark'">
                {{ u.rol }}
              </span>
            </td>
            <td>
              <span class="badge" [ngClass]="u.activo ? 'bg-success' : 'bg-danger'">
                {{ u.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-1"
                      (click)="cambiarRol(u)" title="Cambiar Rol">
                <i class="bi bi-arrow-left-right"></i>
              </button>
              <button class="btn btn-sm me-1"
                      [ngClass]="u.activo ? 'btn-outline-danger' : 'btn-outline-success'"
                      (click)="toggleEstado(u)"
                      [title]="u.activo ? 'Desactivar' : 'Activar'">
                <i class="bi" [ngClass]="u.activo ? 'bi-person-dash' : 'bi-person-check'"></i>
              </button>
            </td>
          </tr>
          <tr *ngIf="usuariosFiltrados.length === 0">
            <td colspan="6" class="text-center py-4 text-muted">
              <i class="bi bi-person-x fs-3"></i>
              <p class="mt-2">No se encontraron usuarios</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Nuevo Usuario -->
<div *ngIf="mostrarModal" class="modal d-block" style="background:rgba(0,0,0,0.5)">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="background: linear-gradient(135deg, #1565C0, #00ACC1); color:white;">
        <h5 class="modal-title">
          <i class="bi bi-person-plus me-2"></i>Nuevo Usuario
        </h5>
        <button class="btn-close btn-close-white" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre *</label>
          <input type="text" class="form-control" [(ngModel)]="form.nombre"
                 placeholder="Nombre completo">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email *</label>
          <input type="email" class="form-control" [(ngModel)]="form.email"
                 placeholder="correo@farmavida.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Contraseña *</label>
          <input type="password" class="form-control" [(ngModel)]="form.password"
                 placeholder="Mínimo 6 caracteres">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Rol</label>
          <select class="form-select" [(ngModel)]="form.rol_id">
            <option [ngValue]="2">Empleado</option>
            <option [ngValue]="1">Administrador</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
        <button class="btn btn-farmavida" (click)="guardar()">
          <i class="bi bi-save me-1"></i>Guardar
        </button>
      </div>
    </div>
  </div>
</div>
