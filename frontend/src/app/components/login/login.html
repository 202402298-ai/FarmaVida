<div class="login-page">
  <div class="login-card">

    <div class="text-center mb-4">
      <div class="logo-text">
        Farma<span>Vida</span>
      </div>
      <p class="text-muted mt-1">Sistema de Gestión de Inventarios</p>
    </div>

    <div *ngIf="error" class="alert alert-danger rounded-3">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Correo electrónico</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control" placeholder="correo@farmavida.com"
               [(ngModel)]="email" (keyup.enter)="login()">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" placeholder="••••••••"
               [(ngModel)]="password" (keyup.enter)="login()">
      </div>
    </div>

    <button class="btn btn-farmavida w-100 py-2 fw-semibold"
            (click)="login()" [disabled]="cargando">
      <span *ngIf="cargando" class="spinner-border spinner-border-sm me-2"></span>
      <i *ngIf="!cargando" class="bi bi-box-arrow-in-right me-2"></i>
      {{ cargando ? 'Iniciando...' : 'Iniciar Sesión' }}
    </button>

    <div class="text-center mt-4 text-muted small">
      <i class="bi bi-shield-check me-1"></i> FarmaVida © 2024
    </div>

  </div>
</div>
