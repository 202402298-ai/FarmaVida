<div class="login-page">
  <div class="login-card">

    <div class="text-center mb-4">
      <div class="logo-text">
        Farma<span>Vida</span>
      </div>
      <p class="text-muted mt-1">Sistema de Gestión de Inventarios</p>
    </div>

    <div *ngIf="error" class="alert alert-danger rounded-3">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Correo electrónico</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control" placeholder="correo@farmavida.com"
               [(ngModel)]="email" (keyup.enter)="login()">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" placeholder="••••••••"
               [(ngModel)]="password" (keyup.enter)="login()">
      </div>
    </div>

    <button class="btn btn-farmavida w-100 py-2 fw-semibold"
            (click)="login()" [disabled]="cargando">
      <span *ngIf="cargando" class="spinner-border spinner-border-sm me-2"></span>
      <i *ngIf="!cargando" class="bi bi-box-arrow-in-right me-2"></i>
      {{ cargando ? 'Iniciando...' : 'Iniciar Sesión' }}
    </button>

    <div class="text-center mt-4 text-muted small">
      <i class="bi bi-shield-check me-1"></i> FarmaVida © 2024
    </div>

  </div>
  <div class="text-center my-3 text-muted small">— o —</div>

<button class="btn btn-outline-dark w-100 py-2 fw-semibold" (click)="loginGoogle()">
  <svg class="me-2" width="18" height="18" viewBox="0 0 48 48">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
  </svg>
  Continuar con Google
</button>
</div>
